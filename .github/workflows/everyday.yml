name: Scrape everyday (manual test)

on:
  workflow_dispatch:

jobs:
  test-fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run everyday scraper (test only — no file writes)
        run: python scraper/scrape_everyday.py
